<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Slap Battles Tester</title>
    <link rel="icon" type="image/png" href="tester.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <button type="button" class="tester-button" id="openModal">
            <img src="tester.png" alt="Tester" class="tester-img">
        </button>

        <div class="text-wrapper">
            <span class="tester-text">Click on the button above to get a FREE tester in Slap Battles</span>
            <img src="SlapIcon.webp" alt="Slap Icon" class="slap-inline-icon">
        </div>
    </div>

    <div class="footer-credit">
        Created by @not.coolart
    </div>

    <div class="modal-overlay" id="videoModal">
        <div class="modal-content">
            <button class="close-btn" id="closeModal">&times;</button>
            <div class="video-container">
                <video id="localVideo" src="rickroll.mp4" controls autoplay playsinline></video>
            </div>
        </div>
    </div>

    <script>
        const modal = document.getElementById('videoModal');
        const openBtn = document.getElementById('openModal');
        const closeBtn = document.getElementById('closeModal');
        const video = document.getElementById('localVideo');

        openBtn.addEventListener('click', () => {
            modal.classList.add('active');
            video.currentTime = 0;
            video.play();
        });

        closeBtn.addEventListener('click', () => {
            modal.classList.remove('active');
            video.pause();
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
                video.pause();
            }
        });
    </script>
</body>
</html>
